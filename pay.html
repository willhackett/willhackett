  <h3>Pay: $<input type="number" id="amount" max="999"/> AUD
    <script type="text/javascript">
    $('#amount').val(amount);
    function setLinks(amount) {
      $('#paypal-link').attr('href', `https://paypal.me/willhackett/${amount}`);
    }
    setLinks(amount);
    $('#amount').on('input', (e) => {
      console.log(e.target.value);
      setLinks(e.target.value);
      amount = e.target.value;
      window.setTimeout(() => {
        if (location.hash !== '') {
          window.history.replaceState('Object', 'Title', location.href.replace(/\#([\d.]+)?/, `#${e.target.value}`));
        } else {
          let newHref = location.href.replace('#', '');
          window.history.replaceState('Object', 'Title', `${newHref}#${e.target.value}`);
        }
      }, 100)
    });
    </script>
</h3>

var handler = StripeCheckout.configure({

  locale: 'auto',

document.getElementById('credit-card').addEventListener('click', function(e) {
  handler.open({
    name: 'Will Hackett',
    description: `Payment of ${amount}`,
    zipCode: false,
    amount: amount
  });
  e.preventDefault();
});
window.addEventListener('popstate', function() {
  handler.close();
});

</script>
